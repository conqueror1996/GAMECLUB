<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Access Gate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:        #080c14;
            --surface:   #0d1424;
            --card:      #111827;
            --border:    #1e2a3a;
            --border2:   #263042;
            --text:      #e2e8f0;
            --muted:     #4b5e78;
            --dim:       #8899aa;
            --green:     #22c55e;
            --red:       #f87171;
            --red-bg:    rgba(248,113,113,0.08);
            --red-bdr:   rgba(248,113,113,0.25);
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .header {
            margin-bottom: 24px;
        }
        .logo {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .subtitle {
            color: var(--dim);
            font-size: 13px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--dim);
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: var(--border2);
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--green);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        .error-box {
            display: none;
            background: var(--red-bg);
            border: 1px solid var(--red-bdr);
            color: var(--red);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🔒</div>
            <div class="title">7Mojo Dual Hedge</div>
            <div class="subtitle">Access restricted. Enter your Access ID to continue.</div>
        </div>
        <div id="errorBox" class="error-box"></div>
        <form id="accessForm">
            <div class="form-group">
                <label for="accessId">Access ID</label>
                <input type="password" id="accessId" autocomplete="current-password" placeholder="Enter Access ID..." required>
            </div>
            <button type="submit" id="submitBtn">Verify Access</button>
        </form>
    </div>

    <script>
        document.getElementById('accessForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const accessId = document.getElementById('accessId').value.trim();
            const errorBox = document.getElementById('errorBox');
            const submitBtn = document.getElementById('submitBtn');
            
            errorBox.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerText = 'Verifying...';
            
            try {
                const response = await fetch('/api/access/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ access_id: accessId })
                });
                
                const result = await response.json();
                if (response.ok && result.success) {
                    window.location.href = '/';
                } else {
                    errorBox.innerText = result.message || 'Verification failed.';
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.innerText = 'Network error. Please try again.';
                errorBox.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Verify Access';
            }
        });
    </script>
</body>
</html>
